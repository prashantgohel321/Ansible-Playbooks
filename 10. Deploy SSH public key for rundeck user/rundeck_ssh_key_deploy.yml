---
- name: Deploy ssh key for rundeck user
  hosts: "{{ group }}"
  become: yes

  vars:
    user_name: rundeck
    pubkey_path: ~/.ssh/id_rsa.pub

  tasks:
    - name: Add ssh public key to authorized_keys
      authorized_key:
        user: "{{ user_name }}"
        state: present
        key: "{{ lookup('file', pubkey_path) }}"